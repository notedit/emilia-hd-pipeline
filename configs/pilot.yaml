# Pilot 真跑配置 —— 单卡 / 本机路径，派生自 pipeline_v1.yaml (docs/PILOT_RUNBOOK.md §1)
version: voxsift-emilia-v1.3-pilot
schema_version: "1.3"

paths:
  root: /opt/dlami/nvme/leolxliu/emilia-pilot
  source: /opt/dlami/nvme/leolxliu/emilia-pilot/source
  stage: /opt/dlami/nvme/leolxliu/emilia-pilot/stage
  s0_prefilter: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s0_prefilter
  s1_acoustics: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s1_acoustics
  s2_prosody: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s2_prosody
  s3_speaker_features: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s3_speaker/features
  s3_speaker_embeddings: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s3_speaker/embeddings
  s4_labels: /opt/dlami/nvme/leolxliu/emilia-pilot/stage/s4_labels
  repacked: /opt/dlami/nvme/leolxliu/emilia-pilot/repacked
  manifests: /opt/dlami/nvme/leolxliu/emilia-pilot/manifests
  done: /opt/dlami/nvme/leolxliu/emilia-pilot/done
  failed: /opt/dlami/nvme/leolxliu/emilia-pilot/failed
  export: /opt/dlami/nvme/leolxliu/emilia-pilot/export

s0:
  min_duration_s: 3.0
  max_duration_s: 30.0
  language: zh
  min_original_dnsmos: 3.2
  min_text_chars: 4

s1:
  min_aes_pq: 7.0
  max_aes_pc: 2.5
  min_aes_ce: 5.0        # content enjoyment 下限 (~p20)
  # DNSMOS 已从 S1 移除 (CPU 串行且慢; S0 保留 Emilia 自带 dnsmos>=3.2 粗筛)
  min_snr_db: 20.0
  max_clipping_ratio: 0.001
  min_bandwidth_hz: 4000.0   # 初值 8000 在真实分布上杀 90%+ (roll-off .99 中位 3.9k); 按中位切, 音质惩罚主要交给 aes_pq

s2:
  z_weights:
    f0_std_st: 0.30
    f0_range_st: 0.20
    energy_std_db: 0.15
    speech_rate_cps: 0.10
    rate_var_cv: 0.15
    pause_count: 0.10
  top_fraction: 0.40
  vad_threshold: 0.5
  vad_min_silence_ms: 100.0
  f0_floor_hz: 60.0
  f0_ceil_hz: 600.0

s3:
  window_s: 1.5
  window_overlap: 0.5
  embedding_dim: 192
  min_win_cos_threshold: 0.70
  mean_win_cos_threshold: 0.80
  # dio 的 voiced 置信度系统性低于 harvest (实测 ~0.15-0.2), 随 S2 换 dio 同步下调; 待 pilot 校准.
  f0_confidence_poor: 0.45
  min_trim_residual_s: 3.0

s4:
  provider: venus
  model: "server:272349"
  base_url: http://v2.open.venus.oa.com/llmproxy
  base_url_env: OPENAI_BASE_URL
  api_key_env: OPENAI_API_KEY
  prompt_version: v3.1
  temperature: 0.0
  max_tokens: 1024
  max_concurrency: 8
  request_timeout_s: 120.0
  retry:
    max_attempts: 5
    base_delay_s: 1.0
    max_delay_s: 60.0
    backoff_multiplier: 2.0
  sample_rate: 16000
  slice_size: 5000
  two_pass_triage: false
  triage_pass_rate_switch: 0.60
  use_guided_json: false

s5:
  weights:
    pq: 0.35
    prosody_dsp_score: 0.25
    expressiveness_intensity: 0.30
    ce: 0.10
  allowed_text_verdicts: [match, fixable]
  forbidden_defects: [truncated_head, truncated_tail]
  allowed_verdicts: [single, intruded_trimmed]
  tier_s_top_fraction: 0.20
  tier_s_min_intensity: 3
  tier_s_exclude_emotions: [neutral]
  tier_b_max_expressiveness: 2
  max_clips_per_speaker: null

repack:
  target_shard_bytes: 1000000000
  priority_expr: "prosody_dsp_score * norm_aesthetics_pq"
  survivor_verdicts: [single, intruded_trimmed, degraded_pass]

hf:
  repo_id: leeoxiang/emilia-expressive-zh
  private: true
  phase1_revision: phase1-filtered
  shard_bytes: 1000000000
  include_metrics: true
  apply_s2_top_fraction: true

models:
  aesthetics_model: audiobox-aesthetics
  aesthetics_weights: /opt/dlami/nvme/leolxliu/weights/audiobox/checkpoint.pt
  dnsmos_onnx: /opt/dlami/nvme/leolxliu/weights/dnsmos/sig_bak_ovr.onnx
  campplus_model: cam++
  campplus_weights: /opt/dlami/nvme/leolxliu/weights/campplus/iic/speech_campplus_sv_zh-cn_16k-common

runtime:
  n_gpus: 1
  total_cores: 64          # 机器上有其他任务在跑, 只用一部分核
  cpu_per_gpu: null
  audio_sample_rate: 24000
  use_mocks: false         # pilot 必须关 mock; 权重路径缺失时会静默回退 mock
  redis_url: null
  mp_start_method: spawn
