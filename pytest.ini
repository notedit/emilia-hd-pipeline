[pytest]
markers =
    gpu: requires a GPU / real model weights
    api: requires a live cloud API key (DashScope / OpenAI-compatible)
    integration: end-to-end across multiple stages
    slow: long-running test
asyncio_mode = auto
testpaths = tests
filterwarnings =
    # ContextLabel.register is the §5.3/§7 published key; it shadows the inherited
    # ABCMeta.register only in name. The field is fully functional (verified); the
    # warning is cosmetic (pydantic drops a nonexistent default from the schema).
    # Renaming would distort the published contract, so we silence the two notes.
    ignore:Field name "register".*shadows an attribute:UserWarning
    ignore:.*is not JSON serializable; excluding default.*:UserWarning
